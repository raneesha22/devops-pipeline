name: CI/CD Pipeline

# Trigger: run this workflow on every push to the main branch
on:
  push:
    branches: [main]

jobs:
  # ── JOB 1: Test ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # ── JOB 2: Build & Push Docker Image ──────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with both "latest" and the commit SHA
          # so you can always roll back to a specific version
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-pipeline:latest
            ${{ secrets.DOCKER_USERNAME }}/devops-pipeline:${{ github.sha }}

  # ── JOB 3: Deploy to AWS EC2 ───────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build # only runs if build & push succeeded

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest Docker image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-pipeline:latest

            # Stop and remove the old container if it's running
            docker stop devops-pipeline || true
            docker rm   devops-pipeline || true

            # Start a fresh container from the new image
            docker run -d \
              --name devops-pipeline \
              --restart unless-stopped \
              -p 80:3000 \
              ${{ secrets.DOCKER_USERNAME }}/devops-pipeline:latest

            # Clean up old unused images to save disk space
            docker image prune -f

            echo "Deployment complete!"
